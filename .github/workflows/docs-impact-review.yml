name: Documentation Impact Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

concurrency:
  group: ${{ format('docs-impact-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  docs-impact-review:
    name: Documentation impact review (advisory)
    if: >
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'cursor/docs-for-pr-')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout pull request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Check for Cursor API key
        id: key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -n "$CURSOR_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Documentation impact skipped::Set the CURSOR_API_KEY secret to enable automated docs updates."
          fi

      - name: Set up Node.js
        if: steps.key.outputs.present == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            tools/cursor-docs-impact/package-lock.json
            docs/package-lock.json

      - name: Install documentation impact dependencies
        if: steps.key.outputs.present == 'true'
        working-directory: tools/cursor-docs-impact
        run: npm ci

      - name: Analyze and update docs
        id: docs
        if: steps.key.outputs.present == 'true'
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_DOCS_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          npm --prefix tools/cursor-docs-impact run update -- \
            --base "origin/${{ github.base_ref }}" \
            --head HEAD \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-url "${{ github.event.pull_request.html_url }}"

      - name: Build docs
        id: build-docs
        if: steps.key.outputs.present == 'true' && steps.docs.outcome == 'success'
        continue-on-error: true
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Upload documentation impact report
        if: steps.key.outputs.present == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-impact-report
          path: .cursor-docs-impact/
          if-no-files-found: ignore

      - name: Create or update documentation PR
        id: docs-pr
        if: steps.key.outputs.present == 'true' && steps.docs.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SOURCE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
          SOURCE_PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if git diff --quiet -- docs; then
            echo "No docs changes produced."
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          branch="cursor/docs-for-pr-${SOURCE_PR_NUMBER}"
          title="Update docs for PR #${SOURCE_PR_NUMBER}"
          patch_file="${RUNNER_TEMP}/docs-impact.patch"

          git diff -- docs > "$patch_file"
          git reset --hard
          git checkout -B "$branch" "origin/${BASE_REF}"
          git apply "$patch_file"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update docs for PR #${SOURCE_PR_NUMBER}"
          git push --force-with-lease origin "$branch"

          body_file="${RUNNER_TEMP}/docs-impact-pr.md"
          {
            echo "#### Summary"
            echo "Updates repository-local documentation for ${SOURCE_PR_URL}."
            echo
            echo "Source PR: #${SOURCE_PR_NUMBER}"
            echo
            echo "Source title: ${SOURCE_PR_TITLE}"
            echo
            echo "#### Release Note"
            echo '```release-note'
            echo "NONE"
            echo '```'
          } > "$body_file"

          existing="$(gh pr list --repo "$REPO" --head "$branch" --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$REPO" --title "$title" --body-file "$body_file"
            echo "Updated documentation PR #${existing}."
          else
            gh pr create --repo "$REPO" --base "$BASE_REF" --head "$branch" --title "$title" --body-file "$body_file"
          fi

          docs_pr_url="$(gh pr list --repo "$REPO" --head "$branch" --json url --jq '.[0].url')"
          echo "docs_pr_url=${docs_pr_url}" >> "$GITHUB_OUTPUT"

      - name: Post or update documentation impact comment
        if: always() && steps.key.outputs.present == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DOCS_OUTCOME: ${{ steps.docs.outcome }}
          BUILD_OUTCOME: ${{ steps.build-docs.outcome }}
          DOCS_CHANGED: ${{ steps.docs-pr.outputs.docs_changed }}
          DOCS_PR_URL: ${{ steps.docs-pr.outputs.docs_pr_url }}
        run: |
          marker="<!-- cursor-docs-impact -->"
          body_file="${RUNNER_TEMP}/docs-impact-comment.md"
          {
            echo "$marker"
            echo "## Documentation impact review"
            echo
            if [ "$DOCS_OUTCOME" != "success" ]; then
              echo "Documentation impact automation could not complete for this PR."
            elif [ "$DOCS_CHANGED" = "true" ]; then
              echo "Documentation updates were proposed in ${DOCS_PR_URL}."
            else
              echo "No documentation changes were produced for this PR."
            fi
            echo
            if [ -f ".cursor-docs-impact/report.md" ]; then
              echo "<details>"
              echo "<summary>Agent report</summary>"
              echo
              cat ".cursor-docs-impact/report.md"
              echo
              echo "</details>"
              echo
            fi
            if [ "$BUILD_OUTCOME" = "failure" ]; then
              echo "The docs build failed after automation. Review the workflow logs before merging docs changes."
              echo
            fi
            echo "_Advisory only — this check does not block merge._"
          } > "$body_file"

          existing="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n1)"

          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" -F body=@"$body_file" >/dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -F body=@"$body_file" >/dev/null
          fi
